@if (feedback) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(feedback.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="feedbackDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirmar operación de borrado</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-feedback-heading" jhiTranslate="opencodetestApp.feedback.delete.question" [translateValues]="{ id: feedback.id }">
        ¿Seguro que quiere eliminar Feedback {{ feedback.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="jhi-confirm-delete-feedback" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Eliminar</span>
      </button>
    </div>
  </form>
}
