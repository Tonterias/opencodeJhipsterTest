<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (feedback(); as feedbackRef) {
      <div>
        <h2 data-cy="feedbackDetailsHeading"><span jhiTranslate="opencodetestApp.feedback.detail.title">Feedback</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ feedbackRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="opencodetestApp.feedback.creationDate">Creation Date</span></dt>
          <dd>
            <span>{{ feedbackRef.creationDate | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="opencodetestApp.feedback.name">Name</span></dt>
          <dd>
            <span>{{ feedbackRef.name }}</span>
          </dd>
          <dt><span jhiTranslate="opencodetestApp.feedback.email">Email</span></dt>
          <dd>
            <span>{{ feedbackRef.email }}</span>
          </dd>
          <dt><span jhiTranslate="opencodetestApp.feedback.feedback">Feedback</span></dt>
          <dd>
            <span>{{ feedbackRef.feedback }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/feedback', feedbackRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
