@if (follow) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(follow.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="followDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirmar operación de borrado</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-follow-heading" jhiTranslate="opencodetestApp.follow.delete.question" [translateValues]="{ id: follow.id }">
        ¿Seguro que quiere eliminar Follow {{ follow.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="jhi-confirm-delete-follow" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Eliminar</span>
      </button>
    </div>
  </form>
}
