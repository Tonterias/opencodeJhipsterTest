<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-follow-heading" data-cy="FollowCreateUpdateHeading" jhiTranslate="opencodetestApp.follow.home.createOrEditLabel">
        Crear o editar Follow
      </h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id" jhiTranslate="global.field.id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_creationDate" jhiTranslate="opencodetestApp.follow.creationDate">Creation Date</label>
          <div class="d-flex">
            <input
              id="field_creationDate"
              data-cy="creationDate"
              type="datetime-local"
              class="form-control"
              name="creationDate"
              formControlName="creationDate"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_followed" jhiTranslate="opencodetestApp.follow.followed">Followed</label>
          <select
            class="form-control"
            id="field_followed"
            data-cy="followed"
            name="followed"
            formControlName="followed"
            [compareWith]="compareAppuser"
          >
            <option [ngValue]="null"></option>
            @for (appuserOption of appusersSharedCollection(); track $index) {
              <option [ngValue]="appuserOption">{{ appuserOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_following" jhiTranslate="opencodetestApp.follow.following">Following</label>
          <select
            class="form-control"
            id="field_following"
            data-cy="following"
            name="following"
            formControlName="following"
            [compareWith]="compareAppuser"
          >
            <option [ngValue]="null"></option>
            @for (appuserOption of appusersSharedCollection(); track $index) {
              <option [ngValue]="appuserOption">{{ appuserOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_cfollowed" jhiTranslate="opencodetestApp.follow.cfollowed">Cfollowed</label>
          <select
            class="form-control"
            id="field_cfollowed"
            data-cy="cfollowed"
            name="cfollowed"
            formControlName="cfollowed"
            [compareWith]="compareCommunity"
          >
            <option [ngValue]="null"></option>
            @for (communityOption of communitiesSharedCollection(); track $index) {
              <option [ngValue]="communityOption">{{ communityOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_cfollowing" jhiTranslate="opencodetestApp.follow.cfollowing">Cfollowing</label>
          <select
            class="form-control"
            id="field_cfollowing"
            data-cy="cfollowing"
            name="cfollowing"
            formControlName="cfollowing"
            [compareWith]="compareCommunity"
          >
            <option [ngValue]="null"></option>
            @for (communityOption of communitiesSharedCollection(); track $index) {
              <option [ngValue]="communityOption">{{ communityOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving()"
          class="btn btn-primary"
        >
          <fa-icon icon="save" />&nbsp;<span jhiTranslate="entity.action.save">Guardar</span>
        </button>
      </div>
    </form>
  </div>
</div>
