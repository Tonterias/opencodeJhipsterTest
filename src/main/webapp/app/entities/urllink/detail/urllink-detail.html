<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (urllink(); as urllinkRef) {
      <div>
        <h2 data-cy="urllinkDetailsHeading"><span jhiTranslate="opencodetestApp.urllink.detail.title">Urllink</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ urllinkRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="opencodetestApp.urllink.linkText">Link Text</span></dt>
          <dd>
            <span>{{ urllinkRef.linkText }}</span>
          </dd>
          <dt><span jhiTranslate="opencodetestApp.urllink.linkURL">Link URL</span></dt>
          <dd>
            <span>{{ urllinkRef.linkURL }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/urllink', urllinkRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
