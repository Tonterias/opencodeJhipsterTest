<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-blockuser-heading" data-cy="BlockuserCreateUpdateHeading" jhiTranslate="opencodetestApp.blockuser.home.createOrEditLabel">
        Crear o editar Blockuser
      </h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id" jhiTranslate="global.field.id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_creationDate" jhiTranslate="opencodetestApp.blockuser.creationDate">Creation Date</label>
          <div class="d-flex">
            <input
              id="field_creationDate"
              data-cy="creationDate"
              type="datetime-local"
              class="form-control"
              name="creationDate"
              formControlName="creationDate"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_blockeduser" jhiTranslate="opencodetestApp.blockuser.blockeduser">Blockeduser</label>
          <select
            class="form-control"
            id="field_blockeduser"
            data-cy="blockeduser"
            name="blockeduser"
            formControlName="blockeduser"
            [compareWith]="compareAppuser"
          >
            <option [ngValue]="null"></option>
            @for (appuserOption of appusersSharedCollection(); track $index) {
              <option [ngValue]="appuserOption">{{ appuserOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_blockinguser" jhiTranslate="opencodetestApp.blockuser.blockinguser">Blockinguser</label>
          <select
            class="form-control"
            id="field_blockinguser"
            data-cy="blockinguser"
            name="blockinguser"
            formControlName="blockinguser"
            [compareWith]="compareAppuser"
          >
            <option [ngValue]="null"></option>
            @for (appuserOption of appusersSharedCollection(); track $index) {
              <option [ngValue]="appuserOption">{{ appuserOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_cblockeduser" jhiTranslate="opencodetestApp.blockuser.cblockeduser">Cblockeduser</label>
          <select
            class="form-control"
            id="field_cblockeduser"
            data-cy="cblockeduser"
            name="cblockeduser"
            formControlName="cblockeduser"
            [compareWith]="compareCommunity"
          >
            <option [ngValue]="null"></option>
            @for (communityOption of communitiesSharedCollection(); track $index) {
              <option [ngValue]="communityOption">{{ communityOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_cblockinguser" jhiTranslate="opencodetestApp.blockuser.cblockinguser">Cblockinguser</label>
          <select
            class="form-control"
            id="field_cblockinguser"
            data-cy="cblockinguser"
            name="cblockinguser"
            formControlName="cblockinguser"
            [compareWith]="compareCommunity"
          >
            <option [ngValue]="null"></option>
            @for (communityOption of communitiesSharedCollection(); track $index) {
              <option [ngValue]="communityOption">{{ communityOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving()"
          class="btn btn-primary"
        >
          <fa-icon icon="save" />&nbsp;<span jhiTranslate="entity.action.save">Guardar</span>
        </button>
      </div>
    </form>
  </div>
</div>
